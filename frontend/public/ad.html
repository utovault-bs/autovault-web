// Draw SVG path on an offscreen canvas and sample pixels
function svgPathToPoints(pathStr, n) {
  var off = document.createElement('canvas');
  off.width = 768; off.height = 768;
  var octx = off.getContext('2d');
  octx.fillStyle = '#fff';
  octx.beginPath();
  
  // Parse SVG path commands (M, C, Z only)
  var re = /([MLCQAZmlcqaz])/g;
  var parts = pathStr.split(re).filter(Boolean);
  var i = 0, x = 0, y = 0;
  
  while (i < parts.length) {
    var cmd = parts[i++].trim();
    var nums = [];
    if (i < parts.length) {
      var raw = parts[i].trim();
      var matches = raw.match(/-?\d+(?:\.\d+)?/g);
      if (matches) nums = matches.map(Number);
      i++;
    }
    
    if (cmd === 'M') { octx.moveTo(nums[0], nums[1]); x = nums[0]; y = nums[1]; }
    else if (cmd === 'C') { octx.bezierCurveTo(nums[0], nums[1], nums[2], nums[3], nums[4], nums[5]); x = nums[4]; y = nums[5]; }
    else if (cmd === 'Z' || cmd === 'z') { octx.closePath(); }
  }
  
  octx.fill('evenodd');
  var imageData = octx.getImageData(0, 0, 768, 768);
  var data = imageData.data;
  var pixels = [];
  for (var py = 0; py < 768; py += 2) {
    for (var px = 0; px < 768; px += 2) {
      if (data[(py * 768 + px) * 4] > 128) pixels.push([px, py]);
    }
  }
  if (pixels.length < 10) return [];
  var pts = [];
  for (var i2 = 0; i2 < n; i2++) {
    var p = pixels[Math.floor(Math.random() * pixels.length)];
    pts.push([(p[0] / 768 - 0.5) * S * 1.6 + CX, (p[1] / 768 - 0.5) * S * 1.6 + CY]);
  }
  return pts;
}

// Generate text points
function buildTextPts(n) {
  var offscreen = document.createElement('canvas');
  offscreen.width = 1400; offscreen.height = 220;
  var offCtx = offscreen.getContext('2d');
  offCtx.fillStyle = '#fff';
  offCtx.font = 'bold 150px Impact, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
  offCtx.textAlign = 'center'; offCtx.textBaseline = 'middle';
  offCtx.fillText('AUTOVAULT', 700, 110);
  var data = offCtx.getImageData(0, 0, 1400, 220).data;
  var pixels = [];
  for (var y = 0; y < 220; y += 2)
    for (var x = 0; x < 1400; x += 2)
      if (data[(y * 1400 + x) * 4] > 128) pixels.push([x, y]);
  if (pixels.length < 10) { var pts = []; for (var i3 = 0; i3 < n; i3++) pts.push([CX + (Math.random() - 0.5) * 200, CY]); return pts; }
  var pts = [];
  for (var i3 = 0; i3 < n; i3++) {
    var p = pixels[Math.floor(Math.random() * pixels.length)];
    pts.push([(p[0] / 1400 - 0.5) * S * 0.85 + CX, (p[1] / 220 - 0.5) * S * 0.16 + CY - S * 0.02]);
  }
  return pts;
}

// ---- INIT ----
function init() {
  S = Math.min(W, H);
  carPts = svgPathToPoints(SVG_PATH, N);
  textPts = buildTextPts(N);
  
  if (carPts.length < 10) {
    // Fallback if SVG failed
    for (var i = 0; i < N; i++) carPts.push([CX + (Math.random() - 0.5) * 200, CY + (Math.random() - 0.5) * 100]);
  }
  
  loading.style.display = 'none';
  canvas.style.display = 'block';
  
  // Create particles
  for (var i = 0; i < N; i++) particles.push(new Particle(i));
  requestAnimationFrame(frame);
}

// ---- PARTICLES ----
var particles = [];
function Particle(idx) {
  this.idx = idx;
  this.x = Math.random() * W; this.y = Math.random() * H;
  this.cx = this.x; this.cy = this.y;
  this.r = 2 + Math.random() * 2;
  this.tx = textPts[idx][0]; this.ty = textPts[idx][1];
  this.cx2 = carPts[idx] ? carPts[idx][0] : CX;
  this.cy2 = carPts[idx] ? carPts[idx][1] : CY;
}
Particle.prototype.draw = function(alpha, glow) {
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#ffffff';
  if (glow) { ctx.shadowColor = '#ffffff'; ctx.shadowBlur = glow; }
  ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0; ctx.globalAlpha = 1;
};
Particle.prototype.target = function(tx, ty, prog) {
  if (prog >= 1) { this.x = tx; this.y = ty; return; }
  var p = prog < 0.5 ? 2 * prog * prog : -1 + (4 - 2 * prog) * prog;
  this.x = this.cx + (tx - this.cx) * p; this.y = this.cy + (ty - this.cy) * p;
};
Particle.prototype.save = function() { this.cx = this.x; this.cy = this.y; };

// ---- ANIMATION ----
var STATES = { SCATTER: 0, TO_CAR: 1, CAR: 2, EXPLODE: 3, TO_TEXT: 4, TEXT: 5 };
var PHASES = [
  { state: STATES.SCATTER, dur: 0.8 },
  { state: STATES.TO_CAR, dur: 2.5 },
  { state: STATES.CAR, dur: 2.5 },
  { state: STATES.EXPLODE, dur: 1.5 },
  { state: STATES.TO_TEXT, dur: 2.5 },
  { state: STATES.TEXT, dur: 999999 }
];
function getState(t) {
  var acc = 0;
  for (var i = 0; i < PHASES.length; i++) {
    if (t >= acc && t < acc + PHASES[i].dur)
      return { state: PHASES[i].state, progress: (t - acc) / PHASES[i].dur };
    acc += PHASES[i].dur;
  }
  return { state: STATES.TEXT, progress: 1 };
}

var startTime = null, revealed = false, textAlpha = 0;

function frame(t) {
  if (!startTime) startTime = t;
  var elapsed = (t - startTime) / 1000;
  var info = getState(elapsed);
  var st = info.state, prog = info.progress;
  ctx.clearRect(0, 0, W, H);

  if (st === STATES.SCATTER) {
    var a = 0.3 + prog * 0.7;
    for (var i = 0; i < N; i++) particles[i].draw(a);
  } else if (st === STATES.TO_CAR) {
    for (var i = 0; i < N; i++) particles[i].target(particles[i].cx2, particles[i].cy2, prog);
    for (var i = 0; i < N; i++) particles[i].save();
    for (var i = 0; i < N; i++) particles[i].draw(0.6 + prog * 0.4, prog * 6);
    if (!revealed) { skipBtn.classList.add('show'); revealed = true; }
  } else if (st === STATES.CAR) {
    for (var i = 0; i < N; i++) particles[i].draw(1, 4);
  } else if (st === STATES.EXPLODE) {
    var p2 = prog < 0.5 ? 2 * prog * prog : -1 + (4 - 2 * prog) * prog;
    for (var i = 0; i < N; i++) {
      var dx = particles[i].cx2 - CX, dy = particles[i].cy2 - CY;
      var angle = Math.atan2(dy, dx);
      var dist = Math.sqrt(dx*dx + dy*dy);
      var maxR = Math.max(W, H) * 0.6;
      var r = dist + (maxR - dist) * p2;
      particles[i].x = CX + Math.cos(angle) * r;
      particles[i].y = CY + Math.sin(angle) * r;
    }
    for (var i = 0; i < N; i++) particles[i].save();
    for (var i = 0; i < N; i++) particles[i].draw(1 - p2 * 0.5, 6 * (1 - p2));
  } else if (st === STATES.TO_TEXT) {
    for (var i = 0; i < N; i++) particles[i].target(particles[i].tx, particles[i].ty, prog);
    for (var i = 0; i < N; i++) particles[i].save();
    for (var i = 0; i < N; i++) particles[i].draw(0.6 + prog * 0.4);
  } else if (st === STATES.TEXT) {
    if (!revealed) { skipBtn.classList.remove('show'); coming.classList.add('show'); revealed = true; }
    if (textAlpha < 1) textAlpha = Math.min(1, textAlpha + 0.015);
    for (var i = 0; i < N; i++) particles[i].draw(Math.max(0, 1 - textAlpha * 2));
    ctx.globalAlpha = textAlpha;
    ctx.shadowColor = '#dc2626'; ctx.shadowBlur = 40;
    ctx.fillStyle = '#dc2626';
    ctx.font = 'bold ' + Math.floor(S * 0.14) + 'px Impact, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('AUTOVAULT', CX, CY - S * 0.02);
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;
  }
  requestAnimationFrame(frame);
}

skipBtn.addEventListener('click', function() {
  startTime = null; revealed = true; textAlpha = 1;
  coming.classList.add('show'); skipBtn.classList.remove('show');
  ctx.clearRect(0, 0, W, H);
  ctx.shadowColor = '#dc2626'; ctx.shadowBlur = 40;
  ctx.fillStyle = '#dc2626';
  ctx.font = 'bold ' + Math.floor(S * 0.14) + 'px Impact, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('AUTOVAULT', CX, CY - S * 0.02);
  ctx.shadowBlur = 0;
});

// Start
init();
</script>
